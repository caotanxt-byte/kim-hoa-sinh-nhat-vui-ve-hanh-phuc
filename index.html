<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HPBD KIM HOA - ELITE EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Montserrat', 'Segoe UI', sans-serif; }
        #wish-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            z-index: 100;
            pointer-events: none;
        }
        .line {
            color: #fff;
            font-size: 1.5rem;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease-out;
            text-shadow: 0 0 10px rgba(255,105,180,0.5);
        }
        .line.show { opacity: 1; transform: translateY(0); }
        .name { font-size: 4rem; font-weight: bold; color: #ff69b4; margin-bottom: 30px; }
        #guide {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); letter-spacing: 3px; font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div id="guide">TAP TO START MIC & BLOW</div>
<div id="wish-layer">
    <div class="line name" id="l0">KIM HOA</div>
    <div class="line" id="l1">Chúc mừng tuổi mới thật xinh đẹp,</div>
    <div class="line" id="l2">Tiền nhiều như lá,</div>
    <div class="line" id="l3">Người yêu nhiều như sao,</div>
    <div class="line" id="l4">Và sớm trở thành đại gia bao cả thế giới. ✨</div>
</div>

<script>
let mic, vol;
let isOut = false;
let particles = [];
let flameSize = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    mic = new p5.AudioIn();
}

function draw() {
    background(10, 5, 15);
    
    let cx = width/2;
    let cy = height/2 + 120;

    if (!isOut) {
        drawCuteCandle(cx, cy);
        checkBlow();
    } else {
        drawMagicDust();
    }
}

function drawCuteCandle(x, y) {
    // Đế nến (Cute Ribbons)
    noStroke();
    fill(255, 182, 193); // Pink Pastel
    rect(x - 20, y, 40, 130, 10);
    fill(255, 105, 180);
    rect(x - 20, y + 30, 40, 15); // Ribbon trang trí
    
    // Ngọn lửa Cinematic
    flameSize = lerp(flameSize, 50 + sin(frameCount * 0.2) * 10, 0.1);
    
    // Glow sâu đa tầng
    for (let i = 15; i > 0; i--) {
        fill(255, 50, 150, 12 - i);
        ellipse(x, y - 40, i * 15, i * 20);
    }
    
    // Lõi lửa
    fill(255, 255, 200);
    beginShape();
    vertex(x, y - 40 - flameSize);
    bezierVertex(x - 25, y - 20, x + 25, y - 20, x, y - 40 - flameSize);
    endShape();
}

function checkBlow() {
    if (mic.enabled) {
        let v = mic.getLevel();
        if (v > 0.15) blowIt();
    }
}

function mousePressed() {
    userStartAudio();
    mic.start();
    if (dist(mouseX, mouseY, width/2, height/2) < 150) blowIt();
}

function blowIt() {
    if (isOut) return;
    isOut = true;
    
    // Tạo hiệu ứng hạt bụi tiên
    for (let i = 0; i < 150; i++) {
        particles.push(new Particle(width/2, height/2 - 50));
    }

    // Hiển thị lời chúc theo nhịp cinematic
    for (let i = 0; i <= 4; i++) {
        setTimeout(() => {
            document.getElementById('l' + i).classList.add('show');
        }, i * 800);
    }
}

class Particle {
    constructor(x, y) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(random(2, 8));
        this.acc = createVector(0, 0.05);
        this.alpha = 255;
        this.color = color(random([ '#ff69b4', '#ffd700', '#ffffff' ]));
    }
    update() {
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.alpha -= 3;
    }
    show() {
        noStroke();
        fill(red(this.color), green(this.color), blue(this.color), this.alpha);
        ellipse(this.pos.x, this.pos.y, random(2, 5));
    }
}

function drawMagicDust() {
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].show();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
